<!DOCTYPE html>
<html lang="fr">
  <header>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;400;500;700&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/0e02459f90.js"
      crossorigin="anonymous"
    ></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/css/style.css" />
    <title>OhMyFood</title>
  </header>
  <body>
    <header>
      <!-- section header / logo -->
      <section>
        <div class="header-block">
          <img
            class="header-logo"
            src="./Images et textes Ohmyfood/images/logo/ohmyfood.png"
            alt="logo"
          />
        </div>
      </section>
      <!--  section localisation -->
      <section>
        <div class="loc-block">
          <p class="loc-texte">
            <i class="fa-solid fa-location-dot loc-img"></i>Paris, Belleville
          </p>
        </div>
      </section>
      <!-- section explorer nos restaurants -->
      <section>
        <div class="explo-block">
          <h1 class="titre explo-titre-center">
            reservez le menu qui vous convient
          </h1>
          <p class="explo-texte-align">
            Découvrez des restaurants d'exception, sélectionnés par nos soins
          </p>
          <button class="btn" href="#">Explorer nos restaurants</button>
        </div>
      </section>
    </header>
    <main>
      <!-- section fontionnement -->
      <section>
        <div class="fonct-block">
          <div>
            <h1 class="titre fonct-titre-margin">Fonctionnement</h1>
          </div>
          <p class="fonct-num">1</p>
          <div class="fonct-case">
            <p>
              <i class="fa-solid fa-mobile-screen-button fonct-img"></i
              >Choisissez un restaurant
            </p>
          </div>
          <p class="fonct-num">2</p>
          <div class="fonct-case">
            <p><i class="fa-solid fa-bars fonct-img"></i>Composez votre menu</p>
          </div>
          <p class="fonct-num">3</p>
          <div class="fonct-case">
            <p>
              <i class="fa-solid fa-shop fonct-img"></i>Dégustez au restaurant
            </p>
          </div>
        </div>
      </section>
      <!-- section restaurants -->
      <section>

        
      </section>
    </main>
    <footer></footer>
  </body>
</html>
